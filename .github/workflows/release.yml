name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.2.3)"
        required: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="${REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $VERSION"

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: CHANGES.md

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            --draft \
            --title "Pomodoro v${VERSION}" \
            --notes-file CHANGES.md

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-aarch64
            runner: macos-latest
          - platform: macos-x64
            runner: macos-15
          - platform: windows-x64
            runner: windows-latest
          - platform: linux-x64
            runner: ubuntu-latest
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/pomodoro/src-tauri -> target

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libayatana-appindicator3-dev \
            libasound2-dev

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked

      - name: Install Vite+
        run: npm install -g vite-plus

      - name: Bump version
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.create-release.outputs.version }}
        run: node scripts/bump-version.mjs "$RELEASE_VERSION"

      - name: Install dependencies
        run: vp install

      - name: Build Tauri app
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        working-directory: apps/pomodoro
        run: cargo tauri build

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.create-release.outputs.version }}
          draft: true
          files: |
            apps/pomodoro/src-tauri/target/release/bundle/dmg/*.dmg
            apps/pomodoro/src-tauri/target/release/bundle/macos/*.app.tar.gz
            apps/pomodoro/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
            apps/pomodoro/src-tauri/target/release/bundle/nsis/*.exe
            apps/pomodoro/src-tauri/target/release/bundle/nsis/*.exe.sig
            apps/pomodoro/src-tauri/target/release/bundle/msi/*.msi
            apps/pomodoro/src-tauri/target/release/bundle/msi/*.msi.sig
            apps/pomodoro/src-tauri/target/release/bundle/deb/*.deb
            apps/pomodoro/src-tauri/target/release/bundle/appimage/*.AppImage
            apps/pomodoro/src-tauri/target/release/bundle/appimage/*.AppImage.sig

  updater-json:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate latest.json for updater
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          TAG="v${VERSION}"

          # Wait for all assets to be available
          sleep 5

          # Get the release assets
          ASSETS=$(gh release view "$TAG" --json assets --jq '.assets')

          # Collect signatures from .sig files
          DARWIN_AARCH64_SIG=""
          DARWIN_X86_64_SIG=""
          WINDOWS_X86_64_SIG=""
          LINUX_X86_64_SIG=""

          for asset in $(echo "$ASSETS" | jq -r '.[] | select(.name | endswith(".sig")) | .name'); do
            SIG_CONTENT=$(gh release download "$TAG" --pattern "$asset" --output - 2>/dev/null || echo "")
            case "$asset" in
              *aarch64*app.tar.gz.sig) DARWIN_AARCH64_SIG="$SIG_CONTENT" ;;
              *x64*app.tar.gz.sig|*x86_64*app.tar.gz.sig) DARWIN_X86_64_SIG="$SIG_CONTENT" ;;
              *x64-setup*.exe.sig|*x64_setup*.exe.sig) WINDOWS_X86_64_SIG="$SIG_CONTENT" ;;
              *amd64*.AppImage.sig|*x86_64*.AppImage.sig) LINUX_X86_64_SIG="$SIG_CONTENT" ;;
            esac
          done

          # Get download URLs (browser_download_url)
          DARWIN_AARCH64_URL=$(echo "$ASSETS" | jq -r '[.[] | select(.name | test("aarch64.*app\\.tar\\.gz$"))] | .[0].url // empty')
          DARWIN_X86_64_URL=$(echo "$ASSETS" | jq -r '[.[] | select(.name | test("(x64|x86_64).*app\\.tar\\.gz$"))] | .[0].url // empty')
          WINDOWS_X86_64_URL=$(echo "$ASSETS" | jq -r '[.[] | select(.name | test("x64.*setup.*\\.exe$"))] | .[0].url // empty')
          LINUX_X86_64_URL=$(echo "$ASSETS" | jq -r '[.[] | select(.name | test("(amd64|x86_64).*\\.AppImage$"))] | .[0].url // empty')

          # Build latest.json
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          PLATFORMS="{}"

          add_platform() {
            local key="$1" url="$2" sig="$3"
            if [ -n "$url" ] && [ -n "$sig" ]; then
              PLATFORMS=$(echo "$PLATFORMS" | jq \
                --arg key "$key" \
                --arg url "$url" \
                --arg sig "$sig" \
                '. + {($key): {"signature": $sig, "url": $url}}')
            fi
          }

          add_platform "darwin-aarch64" "$DARWIN_AARCH64_URL" "$DARWIN_AARCH64_SIG"
          add_platform "darwin-x86_64" "$DARWIN_X86_64_URL" "$DARWIN_X86_64_SIG"
          add_platform "windows-x86_64" "$WINDOWS_X86_64_URL" "$WINDOWS_X86_64_SIG"
          add_platform "linux-x86_64" "$LINUX_X86_64_URL" "$LINUX_X86_64_SIG"

          NOTES=$(gh release view "$TAG" --json body --jq '.body')

          jq -n \
            --arg version "$VERSION" \
            --arg notes "$NOTES" \
            --arg pub_date "$PUB_DATE" \
            --argjson platforms "$PLATFORMS" \
            '{version: $version, notes: $notes, pub_date: $pub_date, platforms: $platforms}' \
            > latest.json

          cat latest.json
          gh release upload "$TAG" latest.json --clobber

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          gh release edit "v${VERSION}" --draft=false

  update-changelog:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate full changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md

      - name: Commit changelog
        env:
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet && exit 0
          git commit -m "chore(release): update CHANGELOG.md for v${VERSION}"
          git push
