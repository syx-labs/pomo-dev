name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Vite+
        run: npm install -g vite-plus

      - name: Install dependencies
        run: vp install

      - name: Check (format + lint + typecheck)
        run: vp check

      - name: Run tests
        run: vp run test -r
